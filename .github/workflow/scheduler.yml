name: Weekly LLMOps Newsletter

on:
  schedule:
    # 12:31 Netherlands time (CEST, UTC+2)
    - cron: "31 10 * * THU"
    #- cron: "0 8 * * MON"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest Hugging Face dataset
        run: python ingest_dataset.py

      - name: Process and analyze newsletter items
        run: python process_analyze.py

      - name: Generate newsletter
        run: python generate_newsletter.py

      - name: Commit generated newsletter
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/ newsletter_outputs/

          git commit -m "Generate weekly LLMOps newsletter" || echo "No changes to commit"
          git push