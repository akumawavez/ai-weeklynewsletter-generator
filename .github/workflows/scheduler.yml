name: Weekly LLMOps Newsletter

on:
  schedule:
    # 12:41 Netherlands time during summer, CEST UTC+2
    - cron: "45 10 * * THU"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Ingest Hugging Face dataset
        run: uv run python ingest_dataset.py

      - name: Process and analyze newsletter items
        run: uv run python process_analyze.py

      - name: Generate newsletter
        run: uv run python generate_newsletter.py

      - name: Commit generated newsletter
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/ newsletter_outputs/

          git commit -m "Generate weekly LLMOps newsletter" || echo "No changes to commit"
          git push